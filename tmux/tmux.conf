set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-sensible'

# General
set -g default-terminal 'tmux-256color'
set -ga terminal-overrides ',*:RGB'
set -g mouse on
set -g set-clipboard on

# Colors
# TODO: use the terminal color scheme instead of tokyo colors here
thm_bg='#222436'
thm_fg='#c8d3f5'
thm_cyan='#86e1fc'
thm_black='#1b1d2b'
thm_gray='#3a3f5a'
thm_magenta='#c099ff'
thm_pink='#ff757f'
thm_red='#ff757f'
thm_green='#c3e88d'
thm_yellow='#ffc777'
thm_blue='#82aaff'
thm_orange='#ff9e64'
thm_black4='#444a73'

# Status
set -g status 2
set -g status-format[1] ""
set -g status-style fg=default,bg=default
set -g status-position top
set -g status-left-length 100
set -g status-left ''
set -g status-right-length 100

# Messages
set -g message-style "fg=${thm_cyan},bg=${thm_bg},align=centre"
set -g message-command-style "fg=${thm_cyan},bg=${thm_bg},align=centre"

# Panes
set -g pane-border-style "fg=${thm_gray}"
set -g pane-active-border-style "fg=${thm_blue}"

# Windows
set -g window-status-separator ''
set -g window-status-activity-style "fg=${thm_fg},bg=${thm_bg},none"
set -g window-status-style "fg=${thm_fg},bg=${thm_bg},none"

# Status - left side
set -g status-left "#{?client_prefix,#[fg=${thm_magenta}],#[fg=${thm_cyan}]}#[bg=${thm_bg}]о‚¶#{?client_prefix,#[bg=${thm_magenta}],#[bg=${thm_cyan}]}#[fg=${thm_bg}]оћ• #[fg=${thm_fg},bg=${thm_gray}] #S#[fg=${thm_gray},bg=${thm_bg}]о‚ґ"

# Status - current window
set -g window-status-current-format " #[fg=${thm_magenta}]#[bg=${thm_bg}]о‚¶#[fg=${thm_bg},bg=${thm_magenta}]#I #[fg=${thm_fg},bg=${thm_gray}] #(echo '#{pane_current_path}' | rev | cut -d'/' -f-2 | rev)#[fg=${thm_gray},bg=${thm_bg}]о‚ґ"

# Status - other windows
set -g window-status-format " #[fg=${thm_gray}]#[bg=${thm_bg}]о‚¶#[fg=${thm_magenta},bg=${thm_gray}] #I #[fg=${thm_fg},bg=${thm_gray}] #W#[fg=${thm_gray},bg=${thm_bg}]о‚ґ"

# Status - right side
set -g status-right "#[fg=${thm_blue},bg=${thm_bg},nobold,nounderscore,noitalics]о‚¶#[fg=${thm_bg},bg=${thm_blue},nobold,nounderscore,noitalics]оќ  #[fg=${thm_fg},bg=${thm_gray}] #(echo $SHELL)#[fg=${thm_gray},bg=${thm_bg}]о‚ґ"
set -ag status-right " #[fg=${thm_green},bg=${thm_bg}]о‚¶#[fg=${thm_bg},bg=${thm_green},nobold,nounderscore,noitalics]пђє #[fg=${thm_fg},bg=${thm_gray}] #(date +'%a %b %d %I:%M %p')#[fg=${thm_gray},bg=${thm_bg}]о‚ґ"

# Meta + Arrow keys to switch panes
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Meta + [number] keys to switch window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Splitting
unbind '"'
unbind %
bind -  split-window -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind _ select-layout even-horizontal
bind | select-layout even-horizontal
bind + select-layout tiled

# Start numbering at 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Reload
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# TPM
run ~/.config/tmux/plugins/tpm/tpm
